# ─── Development docker-compose ───────────────────────────────────────────────
# Starts the full stack with hot-reload for both client and server.
# All defaults here are intentionally weak dev-only values.
#
# Secrets are read from a root .env file (copy .env.example → .env).
# Without a .env the built-in defaults are used so `docker:dev:up` still works
# out of the box for new contributors.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sptune
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sp_dev_net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-devpassword}@db:5432/sptune
      TOKEN_SECRET: ${TOKEN_SECRET:-dev_secret_change_in_prod_32chars_xx}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      # Set ADMIN_SECRET (or ADMIN_SECRET_HASH) to enable the /admin panel in dev.
      # Access at http://localhost:5173/admin — use the value below as the password.
      ADMIN_SECRET: ${ADMIN_SECRET:-dev_admin}
      ADMIN_SECRET_HASH: ${ADMIN_SECRET_HASH:-}
      ADMIN_ALLOWED_IPS: ${ADMIN_ALLOWED_IPS:-}
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma
    ports:
      - "3001:3001"
    networks:
      - sp_dev_net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
    ports:
      - "5173:5173"
    networks:
      - sp_dev_net

networks:
  sp_dev_net:
    driver: bridge

volumes:
  postgres_dev_data:
