services:
  - type: web
    name: sunny-tune-backend
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    # Render assigns its own PORT — the server already reads process.env.PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard — copy from Railway
      - key: TOKEN_SECRET
        sync: false  # Set manually in Render dashboard — copy from Railway
      - key: ADMIN_SECRET_HASH
        sync: false  # Set manually in Render dashboard — copy from Railway
      - key: CORS_ORIGIN
        sync: false  # Set to your Vercel URL, e.g. https://your-app.vercel.app
