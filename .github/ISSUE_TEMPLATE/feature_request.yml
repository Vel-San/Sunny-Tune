name: Feature Request
description: Suggest a new feature or improvement to SunnyTune
title: "[Feature]: "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea that would make SunnyTune better? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? What's the frustration or gap you're experiencing?
      placeholder: "e.g. I can't easily find configs for my specific vehicle..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like. How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Which area does this affect?
      multiple: true
      options:
        - Configurator / parameter editing
        - Explore / discovery
        - Sharing & collaboration
        - Dashboard / analytics
        - Collections
        - Import / Export
        - Admin panel
        - Performance
        - Accessibility
        - Mobile experience
        - API / backend
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this hasn't been requested yet.
          required: true
