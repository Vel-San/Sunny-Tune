name: Official Docs Coverage Audit

# Runs every day at 06:00 UTC and on manual trigger.
# Posts results as a comment on a persistent tracking issue (label: docs-audit).
# The audit script respects CI=true (set automatically by GitHub Actions) and
# outputs plain text without ANSI colour codes.
#
# Source of truth: https://github.com/sunnypilot/user-docs
# Rendered at:     https://docs.sunnypilot.ai

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  audit:
    name: sunnypilot official docs coverage audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run docs audit
        id: audit
        # CI=true is set automatically by GitHub Actions — the audit script
        # reads this variable to suppress ANSI colour codes.
        run: |
          OUTPUT=$(npm run docs:audit --silent 2>&1)
          echo "$OUTPUT"
          {
            echo 'output<<AUDIT_EOF'
            echo "$OUTPUT"
            echo 'AUDIT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Ensure docs-audit label exists
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'docs-audit',
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'docs-audit',
                color: '0075ca',
                description: 'Automated sunnypilot official docs coverage audit results',
              });
              core.info('Created docs-audit label');
            }

      - name: Post audit to tracking issue
        uses: actions/github-script@v7
        env:
          AUDIT_OUTPUT: ${{ steps.audit.outputs.output }}
        with:
          script: |
            const output = process.env.AUDIT_OUTPUT ?? '(no output)';
            const today  = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              `## Docs Coverage Audit — ${today}`,
              '',
              '```',
              output,
              '```',
              '',
              `> Trigger: \`${context.eventName}\` · [workflow run](${runUrl})`,
            ].join('\n');

            // Find an existing open tracking issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'docs-audit',
              state: 'open',
              per_page: 1,
            });

            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body,
              });
              core.info(`Added comment to issue #${issues[0].number}`);
            } else {
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '📋 Official Docs Coverage Audit — Tracking',
                body: [
                  'Ongoing tracking of sunnypilot official docs (https://docs.sunnypilot.ai) coverage against SunnyTune\'s config editor.',
                  '',
                  'Source of truth: https://github.com/sunnypilot/user-docs',
                  '',
                  'Updated daily by the **docs-audit** GitHub Actions workflow.',
                  'Each comment is one audit run. See the sidebar for navigation.',
                  '',
                  '---',
                  body,
                ].join('\n'),
                labels: ['docs-audit'],
              });
              core.info(`Created new tracking issue #${issue.number}`);
            }
