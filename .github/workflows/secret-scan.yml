name: Secret Scan

on:
  push:
    branches: [main, dev, master]
  pull_request:
    branches: [main, dev, master]

jobs:
  gitleaks:
    name: Detect secrets & credentials
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required to post PR comments when a leak is detected
      pull-requests: write

    steps:
      - name: Checkout (full history so all commits are scanned)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional paid licence key — works without it; remove if not needed:
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
